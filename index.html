<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>化工企业WMS仓储管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="6" fill="#2F6BFF"/>
            <path d="M7 10h14M7 14h14M7 18h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">WMS 仓储系统</span>
      </div>

      <nav class="sidebar-menu" id="sidebarMenu">
        <!-- 首页 -->
        <div class="menu-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
          <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zm10 0a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
          <span>首页看板</span>
        </div>

        <!-- 基础数据 -->
        <div class="menu-group">
          <div class="menu-group-title" onclick="toggleMenuGroup(this)">
            <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
            <span>基础数据</span>
            <svg class="menu-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
          </div>
          <div class="submenu open">
            <div class="menu-item" data-page="master-material" onclick="navigateTo('master-material')"><span>物料主数据</span></div>
            <div class="menu-item" data-page="master-warehouse" onclick="navigateTo('master-warehouse')"><span>仓库/库位管理</span></div>
            <div class="menu-item" data-page="master-supplier" onclick="navigateTo('master-supplier')"><span>供应商管理</span></div>
            <div class="menu-item" data-page="master-customer" onclick="navigateTo('master-customer')"><span>客户管理</span></div>
          </div>
        </div>

        <!-- 入库管理 -->
        <div class="menu-group">
          <div class="menu-group-title" onclick="toggleMenuGroup(this)">
            <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3z"/></svg>
            <span>入库管理</span>
            <svg class="menu-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
          </div>
          <div class="submenu">
            <div class="menu-item" data-page="inbound-list" onclick="navigateTo('inbound-list')"><span>入库单管理</span></div>
            <div class="menu-item" data-page="inbound-receive" onclick="navigateTo('inbound-receive')"><span>收货/质检</span></div>
            <div class="menu-item" data-page="shelf-management" onclick="navigateTo('shelf-management')"><span>上架任务</span></div>
            <div class="menu-item" data-page="shelf-strategy" onclick="navigateTo('shelf-strategy')"><span>上架策略配置</span></div>
          </div>
        </div>

        <!-- 出库管理 -->
        <div class="menu-group">
          <div class="menu-group-title" onclick="toggleMenuGroup(this)">
            <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3z"/></svg>
            <span>出库管理</span>
            <svg class="menu-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
          </div>
          <div class="submenu">
            <div class="menu-item" data-page="outbound-list" onclick="navigateTo('outbound-list')"><span>出库单管理</span></div>
            <div class="menu-item" data-page="outbound-pick" onclick="navigateTo('outbound-pick')"><span>拣货/复核</span></div>
          </div>
        </div>

        <!-- 库存管理 -->
        <div class="menu-group">
          <div class="menu-group-title" onclick="toggleMenuGroup(this)">
            <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 2h10v7h-2l-1 2H8l-1-2H5V5z"/></svg>
            <span>库存管理</span>
            <svg class="menu-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
          </div>
          <div class="submenu">
            <div class="menu-item" data-page="inventory-query" onclick="navigateTo('inventory-query')"><span>库存查询</span></div>
            <div class="menu-item" data-page="inventory-trace" onclick="navigateTo('inventory-trace')"><span>批次追溯</span></div>
          </div>
        </div>

        <!-- 盘点管理 -->
        <div class="menu-item" data-page="counting" onclick="navigateTo('counting')">
          <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9zM4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z"/></svg>
          <span>盘点管理</span>
        </div>

        <!-- 库内作业 -->
        <div class="menu-item" data-page="warehouse-ops" onclick="navigateTo('warehouse-ops')">
          <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M8 5a1 1 0 100 2h5.586l-1.293 1.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L13.586 5H8zM12 15a1 1 0 100-2H6.414l1.293-1.293a1 1 0 10-1.414-1.414l-3 3a1 1 0 000 1.414l3 3a1 1 0 001.414-1.414L6.414 15H12z"/></svg>
          <span>库内作业</span>
        </div>

        <!-- 条码标签 -->
        <div class="menu-item" data-page="barcode" onclick="navigateTo('barcode')">
          <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm2 2V5h1v1H5zM3 13a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1v-3zm2 2v-1h1v1H5zM13 3a1 1 0 00-1 1v3a1 1 0 001 1h3a1 1 0 001-1V4a1 1 0 00-1-1h-3zm1 2v1h1V5h-1z" clip-rule="evenodd"/></svg>
          <span>条码/标签</span>
        </div>

        <!-- 安全合规 -->
        <div class="menu-group">
          <div class="menu-group-title" onclick="toggleMenuGroup(this)">
            <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5C17.944 5.654 18 6.32 18 7c0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.68.056-1.346.166-1.999zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            <span>安全合规</span>
            <svg class="menu-arrow" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
          </div>
          <div class="submenu">
            <div class="menu-item" data-page="safety-ledger" onclick="navigateTo('safety-ledger')"><span>危化品台账</span></div>
            <div class="menu-item" data-page="safety-log" onclick="navigateTo('safety-log')"><span>操作日志</span></div>
          </div>
        </div>

        <!-- 报表中心 -->
        <div class="menu-item" data-page="reports" onclick="navigateTo('reports')">
          <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
          <span>报表中心</span>
        </div>

        <!-- 系统管理 -->
        <div class="menu-item" data-page="system" onclick="navigateTo('system')">
          <svg class="menu-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          <span>系统管理</span>
        </div>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <div class="main-wrapper">
      <!-- 顶部栏 -->
      <header class="header">
        <div class="header-left">
          <div class="header-breadcrumb" id="breadcrumb">首页看板</div>
        </div>
        <div class="header-right">
          <div class="header-notification">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="#64748B"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zm0 16a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
            <span class="badge">5</span>
          </div>
          <div class="header-user">
            <div class="user-avatar">管</div>
            <span class="user-name">管理员</span>
          </div>
        </div>
      </header>

      <!-- 内容区 -->
      <div class="content" id="content">
        <!-- 页面内容由JS动态渲染 -->
      </div>
    </div>
  </div>

  <!-- 弹窗容器 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
